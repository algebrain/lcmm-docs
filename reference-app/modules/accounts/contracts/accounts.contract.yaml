contract_version: "1.0"
module:
  name: "accounts"
  owner: "reference-app"
  summary: "Demo users and roles for sync-read and app-level session flows"

http:
  operations:
    - operation_id: "get_me"
      method: "GET"
      path: "/accounts/me"
      summary: "Return user by user-id query parameter"
      x-idempotent: true
      x-idempotency-key: "query.user-id"
      x-transactional: "none"
      request:
        query:
          type: object
          required: [user-id]
          properties:
            user-id: {type: string}
      responses:
        "200": {description: "User found"}
        "400": {description: "user-id query parameter is required"}
        "404": {description: "User not found"}

    - operation_id: "get_user_by_id"
      method: "GET"
      path: "/accounts/users/{user_id}"
      summary: "Return user by id"
      x-idempotent: true
      x-idempotency-key: "path.user_id"
      x-transactional: "none"
      request:
        path:
          type: object
          required: [user_id]
          properties:
            user_id: {type: string}
      responses:
        "200": {description: "User found"}
        "404": {description: "User not found"}

read_providers:
  provides:
    - provider_id: "accounts/get-user-by-id"
      summary: "Return user record by user-id"
      input:
        type: map
        required: [user-id]
        properties:
          user-id: {type: string}
      output:
        type: map-or-nil
        description: "User record or nil when user does not exist"
      errors: ["invalid-arg", "unavailable", "internal"]
      error_behavior:
        mode: "mixed"
        return_error_shape:
          type: map
          required: [code]
          properties:
            code: {type: keyword}
            message: {type: string}
            retryable?: {type: boolean}
        throw_types: ["clojure.lang.ExceptionInfo"]

    - provider_id: "accounts/get-user-by-login"
      summary: "Return user record by login for app-level login flow"
      input:
        type: map
        required: [login]
        properties:
          login: {type: string}
      output:
        type: map-or-nil
        description: "User record or nil when login is unknown"
      errors: ["invalid-arg", "unavailable", "internal"]
      error_behavior:
        mode: "mixed"
        return_error_shape:
          type: map
          required: [code]
          properties:
            code: {type: keyword}
            message: {type: string}
            retryable?: {type: boolean}
        throw_types: ["clojure.lang.ExceptionInfo"]

types:
  schemas:
    user_id: {type: string}
    user_login: {type: string}
    user_role: {type: string}

behavior:
  defaults:
    x-timeout-ms: 1000
    x-failure-mode: "fail-fast"

narrative:
  purpose: "Provide compact user and role data for browser-first manual checks and sync-read"
  scenarios:
    - "Browser user opens /accounts/me?user-id=u-alice"
    - "Booking module resolves user by user-id through read-provider registry"
    - "Browser user opens /accounts/users/u-alice"
  dependencies:
    - "sqlite storage or external db resource"

compatibility:
  module_contract_version: "0.1.0"
