contract_version: "1.0"
module:
  name: "audit"
  owner: "reference-app"
  summary: "Reactive audit trail for booking and notify event flows"

http:
  operations:
    - operation_id: "list_audit_records"
      method: "GET"
      path: "/audit"
      summary: "List audit records for manual verification and debugging"
      x-idempotent: true
      x-idempotency-key: "method + ':' + path"
      x-transactional: "none"
      request:
        query:
          type: object
      responses:
        "200": {description: "List of audit records"}

events:
  subscribes:
    - event: "booking/create-requested"
      summary: "Record booking create request event"
      x-idempotent: false
      x-transactional: "none"
      x-consumes: ["booking/create-requested"]
      payload:
        type: object
        required: [slot-id, user-id]
        properties:
          slot-id: {type: string}
          user-id: {type: string}

    - event: "booking/created"
      summary: "Record successful booking event"
      x-idempotent: false
      x-transactional: "none"
      x-consumes: ["booking/created"]
      payload:
        type: object
        required: [booking-id, slot-id, user-id]
        properties:
          booking-id: {type: string, format: uuid}
          slot-id: {type: string}
          user-id: {type: string}

    - event: "booking/rejected"
      summary: "Record rejected booking event"
      x-idempotent: false
      x-transactional: "none"
      x-consumes: ["booking/rejected"]
      payload:
        type: object
        required: [slot-id, user-id, reason]
        properties:
          slot-id: {type: string}
          user-id: {type: string}
          reason: {type: string}

    - event: "notify/booking-created"
      summary: "Record derived notification event"
      x-idempotent: false
      x-transactional: "none"
      x-consumes: ["notify/booking-created"]
      payload:
        type: object
        required: [booking-id, message]
        properties:
          booking-id: {type: string, format: uuid}
          message: {type: string}

types:
  schemas:
    audit_id: {type: string, format: uuid}
    event_type: {type: string}
    correlation_id: {type: string}
    causation_path: {type: string}

behavior:
  defaults:
    x-timeout-ms: 1000
    x-failure-mode: "fail-fast"

narrative:
  purpose: "Provide a compact audit trail with correlation and causation data for reactive flow inspection"
  scenarios:
    - "Booking flow emits booking/create-requested and booking/created"
    - "Notify emits notify/booking-created as derived event"
    - "Audit persists event type, correlation-id and causation-path for all tracked events"
    - "Browser user opens /audit to inspect the full chain"
  dependencies:
    - "booking contract"
    - "notify contract"
    - "sqlite storage or external db resource"

compatibility:
  module_contract_version: "0.1.0"
